# docker-compose.yml — Pulso Medellín  (v0.2 · fix Sprint 0)
# ----------------------------------------------------------------------
# CAMBIOS v0.2 respecto a v0.1:
#   - Quitado healthcheck de iceberg-rest: la imagen no trae wget/curl/nc,
#     así que cualquier healthcheck HTTP falla por "executable not found"
#     y deja el contenedor "unhealthy" para siempre.
#   - Spark depende de iceberg-rest con condition: service_started (no
#     service_healthy). Confiamos en retries del lado cliente.
#   - Imágenes pineadas a `latest` (es lo que mantiene Tabular).
# ----------------------------------------------------------------------

name: pulsomed

networks:
  pulsomed-net:
    name: pulsomed-net
    driver: bridge

volumes:
  minio-data:
  mongo-data:

services:

  # -------------------- MinIO (S3 local) --------------------
  minio:
    image: minio/minio:latest
    container_name: pulsomed-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: minio
    volumes:
      - minio-data:/data
    networks:
      - pulsomed-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # -------------------- mc (init buckets) -------------------
  # Se ejecuta una sola vez. Crea el bucket "warehouse" y termina.
  mc:
    image: minio/mc:latest
    container_name: pulsomed-mc-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - pulsomed-net
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}) do
        echo 'Esperando a MinIO...' && sleep 2;
      done;
      /usr/bin/mc mb -p local/warehouse || true;
      /usr/bin/mc anonymous set public local/warehouse || true;
      echo 'Bucket warehouse listo.';
      exit 0;
      "

  # -------------------- Iceberg REST Catalog ----------------
  # NOTA importante: la imagen tabulario/iceberg-rest es minimalista y NO
  # trae wget/curl/nc, por lo que NO se le puede poner healthcheck HTTP.
  # Confiamos en service_started + retries del cliente (Spark / smoke).
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: pulsomed-iceberg-rest
    restart: unless-stopped
    depends_on:
      mc:
        condition: service_completed_successfully
    ports:
      - "${ICEBERG_REST_PORT:-8181}:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    networks:
      - pulsomed-net

  # -------------------- Spark + Iceberg ---------------------
  # Imagen de Tabular: Spark 3.5 con Iceberg, AWS bundle y Jupyter.
  spark-iceberg:
    image: tabulario/spark-iceberg:latest
    container_name: pulsomed-spark
    restart: unless-stopped
    depends_on:
      iceberg-rest:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "${SPARK_UI_PORT:-8080}:8080"
      - "${JUPYTER_PORT:-8888}:8888"
      - "${SPARK_THRIFT_PORT:-10000}:10000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      HMAC_USER_PSEUDO_SECRET: ${HMAC_USER_PSEUDO_SECRET:-cambia-esta-clave-antes-de-la-entrega}
    volumes:
      - ./src:/workspace/src
      - ./scripts:/workspace/scripts
      - ./tests:/workspace/tests
      - ./notebooks:/home/iceberg/notebooks
      - ./data:/workspace/data
    networks:
      - pulsomed-net

  # -------------------- MongoDB -----------------------------
  mongodb:
    image: mongo:7
    container_name: pulsomed-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: pulsomed
    volumes:
      - mongo-data:/data/db
      - ./tests:/workspace/tests:ro
    networks:
      - pulsomed-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

