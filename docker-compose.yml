# docker-compose.yml — Pulso Medellín  (v0.2 · fix Sprint 0)
# ----------------------------------------------------------------------
# CAMBIOS v0.2 respecto a v0.1:
#   - Quitado healthcheck de iceberg-rest: la imagen no trae wget/curl/nc,
#     así que cualquier healthcheck HTTP falla por "executable not found"
#     y deja el contenedor "unhealthy" para siempre.
#   - Spark depende de iceberg-rest con condition: service_started (no
#     service_healthy). Confiamos en retries del lado cliente.
#   - Imágenes pineadas a `latest` (es lo que mantiene Tabular).
# ----------------------------------------------------------------------

name: pulsomed

networks:
  pulsomed-net:
    name: pulsomed-net
    driver: bridge

volumes:
  minio-data:
  mongo-data:
  flink-checkpoints:

services:

  # -------------------- MinIO (S3 local) --------------------
  minio:
    image: minio/minio:latest
    container_name: pulsomed-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: minio
    volumes:
      - minio-data:/data
    networks:
      - pulsomed-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # -------------------- mc (init buckets) -------------------
  # Se ejecuta una sola vez. Crea el bucket "warehouse" y termina.
  mc:
    image: minio/mc:latest
    container_name: pulsomed-mc-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - pulsomed-net
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}) do
        echo 'Esperando a MinIO...' && sleep 2;
      done;
      /usr/bin/mc mb -p local/warehouse || true;
      /usr/bin/mc anonymous set public local/warehouse || true;
      echo 'Bucket warehouse listo.';
      exit 0;
      "

  # -------------------- Iceberg REST Catalog ----------------
  # NOTA importante: la imagen tabulario/iceberg-rest es minimalista y NO
  # trae wget/curl/nc, por lo que NO se le puede poner healthcheck HTTP.
  # Confiamos en service_started + retries del cliente (Spark / smoke).
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: pulsomed-iceberg-rest
    restart: unless-stopped
    depends_on:
      mc:
        condition: service_completed_successfully
    ports:
      - "${ICEBERG_REST_PORT:-8181}:8181"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    networks:
      - pulsomed-net

  # -------------------- Spark + Iceberg ---------------------
  # Imagen de Tabular: Spark 3.5 con Iceberg, AWS bundle y Jupyter.
  spark-iceberg:
    image: tabulario/spark-iceberg:latest
    container_name: pulsomed-spark
    restart: unless-stopped
    depends_on:
      iceberg-rest:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "${SPARK_UI_PORT:-8080}:8080"
      - "${JUPYTER_PORT:-8888}:8888"
      - "${SPARK_THRIFT_PORT:-10000}:10000"
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      HMAC_USER_PSEUDO_SECRET: ${HMAC_USER_PSEUDO_SECRET:-cambia-esta-clave-antes-de-la-entrega}
    volumes:
      - ./src:/workspace/src
      - ./scripts:/workspace/scripts
      - ./tests:/workspace/tests
      - ./notebooks:/home/iceberg/notebooks
      - ./data:/workspace/data
    networks:
      - pulsomed-net

  # -------------------- MongoDB -----------------------------
  mongodb:
    image: mongo:7
    container_name: pulsomed-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: pulsomed
    volumes:
      - mongo-data:/data/db
      - ./tests:/workspace/tests:ro
    networks:
      - pulsomed-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # ======================================================================
  # [SPRINT 2+]  Streaming stack
  # ======================================================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pulsomed-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - pulsomed-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pulsomed-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_HOST_PORT:-29092}:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - pulsomed-net

  # Para Sprint 2 usamos un "Flink" en Python pequeño que vive como un
  # consumidor Kafka + sink Mongo dentro de un contenedor genérico Python.
  # Esto evita la complejidad de subir Flink JobManager/TaskManager + PyFlink
  # y entregar la pregunta S-2 con los mismos primitivos de ventanas.
  # En Sprint 3 migraremos a Flink real cuando haya 4 jobs paralelos.
  stream-runner:
    image: python:3.11-slim
    container_name: pulsomed-stream-runner
    restart: unless-stopped
    depends_on:
      - kafka
      - mongodb
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_HOST: mongodb
      PYTHONUNBUFFERED: "1"
      # Credenciales MinIO/S3 + REST Catalog — habilitan PyIceberg en vivo
      # desde el stream-runner (Sprint 4: job_hibrido.py lee Gold sin Spark).
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      ICEBERG_REST_URI: http://iceberg-rest:8181
      ICEBERG_S3_ENDPOINT: http://minio:9000
    volumes:
      - ./src:/workspace/src
      - ./scripts:/workspace/scripts
      - ./data:/workspace/data
    working_dir: /workspace
    command: ["sh", "-c", "pip install --quiet kafka-python pymongo 'pyiceberg[s3fs,pyarrow]' && tail -f /dev/null"]
    networks:
      - pulsomed-net

  # ======================================================================
  # [SPRINT 6]  Apache Flink — motor streaming requerido por rúbrica § 3.1
  # ----------------------------------------------------------------------
  # JobManager + TaskManager con PyFlink 1.18 y connector Kafka. Se mantiene
  # el `stream-runner` Python como complemento (jobs Sprint 2/3 y Spark
  # Structured Streaming bonus). El job PyFlink real vive en
  # `src/streaming/flink_real/siata_alert_flink.py` y demuestra:
  #   · KafkaSource conectado a `siata.lecturas`
  #   · Tumbling window (event-time/processing-time configurable)
  #   · Sink NoSQL hacia MongoDB
  #   · Checkpointing con semántica at-least-once
  # ======================================================================

  flink-jobmanager:
    build:
      context: ./docker/flink
    image: pulsomed/flink:1.18-pyflink
    container_name: pulsomed-flink-jobmanager
    restart: unless-stopped
    depends_on:
      - kafka
      - mongodb
    ports:
      - "${FLINK_UI_PORT:-8082}:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1024m
        rest.address: flink-jobmanager
        rest.bind-address: 0.0.0.0
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: AT_LEAST_ONCE
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_HOST: mongodb
    volumes:
      - ./src:/workspace/src
      - ./scripts:/workspace/scripts
      - flink-checkpoints:/tmp/flink-checkpoints
    networks:
      - pulsomed-net

  flink-taskmanager:
    image: pulsomed/flink:1.18-pyflink
    container_name: pulsomed-flink-taskmanager
    restart: unless-stopped
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.memory.process.size: 1536m
        taskmanager.numberOfTaskSlots: 2
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_HOST: mongodb
    volumes:
      - ./src:/workspace/src
      - ./scripts:/workspace/scripts
      - flink-checkpoints:/tmp/flink-checkpoints
    networks:
      - pulsomed-net

  # ======================================================================
  # [SPRINT 5]  Trino — tercer motor SQL sobre las tablas Gold (bonus +2 pt)
  # ======================================================================

  trino:
    image: trinodb/trino:latest
    container_name: pulsomed-trino
    depends_on:
      iceberg-rest:
        condition: service_started
      minio:
        condition: service_healthy
    ports:
      - "${TRINO_PORT:-8084}:8080"
    volumes:
      - ./docker/trino/etc:/etc/trino
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - pulsomed-net
