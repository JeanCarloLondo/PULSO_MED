# Catálogo Iceberg para Trino — apunta al mismo REST Catalog y MinIO que Spark.
# prefix=pulsomed hace que Trino exponga bronze/silver/gold como schemas directos.

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.nested-namespace-enabled=true

# S3 / MinIO (fs.s3.enabled reemplaza fs.native-s3.enabled en Trino 462+)
fs.s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=admin
s3.aws-secret-key=admin12345
s3.region=us-east-1

# Formato por defecto (Spark escribe Parquet con Iceberg)
iceberg.file-format=PARQUET
