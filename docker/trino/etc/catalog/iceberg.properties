# Catálogo Iceberg para Trino — apunta al mismo REST Catalog y MinIO que Spark.
# Las credenciales se inyectan vía variables de entorno (MINIO_ROOT_USER/PASSWORD)
# resueltas por Trino con la sintaxis ${ENV:VAR}. Requiere
# secrets-loader o resolver compatible (Trino 460+ usa env: directamente).

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.nested-namespace-enabled=true

# S3 / MinIO (fs.s3.enabled reemplaza fs.native-s3.enabled en Trino 462+)
fs.s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
s3.region=us-east-1

# Formato por defecto (Spark escribe Parquet con Iceberg)
iceberg.file-format=PARQUET
