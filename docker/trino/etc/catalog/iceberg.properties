# Catálogo Iceberg para Trino — apunta al mismo REST Catalog y MinIO que Spark.
# Las credenciales leen de variables de entorno inyectadas por docker-compose.

connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181

# S3 / MinIO
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=${ENV:MINIO_ROOT_USER}
s3.aws-secret-key=${ENV:MINIO_ROOT_PASSWORD}
s3.region=us-east-1

# Formato por defecto (Spark escribe Parquet)
iceberg.file-format=PARQUET
